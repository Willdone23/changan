<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 
    长安 Logo - 开口佛珠 · 山行
    设计理念：开口佛珠手串 + 层叠山峦 + 山顶明珠
    虚实结合：前山实，后山虚，如远山如黛
  -->
  
  <!-- 开口圆环（佛珠手串） - 底部完整，顶部开口 -->
  <path d="M20 22 
           C12 28, 10 38, 10 50 
           C10 66, 18 78, 30 82
           C40 85, 60 85, 70 82
           C82 78, 90 66, 90 50
           C90 38, 88 28, 80 22" 
        stroke="#A8443C" 
        stroke-width="3" 
        stroke-linecap="round" 
        fill="none"/>
  
  <!-- 左侧开口端珠子 -->
  <circle cx="18" cy="20" r="4" fill="#A8443C"/>
  
  <!-- 右侧开口端珠子 -->
  <circle cx="82" cy="20" r="4" fill="#A8443C"/>
  
  <!-- 后山（最虚） - 远景山脉 -->
  <path d="M20 62 L28 52 L34 56 L42 48 L50 54 L58 46 L66 54 L72 50 L80 62 Z" 
        fill="#A8443C" 
        opacity="0.2"/>
  
  <!-- 中山（半虚） - 中景山脉 -->
  <path d="M16 68 L24 56 L32 62 L42 52 L52 60 L62 50 L72 58 L80 54 L84 68 Z" 
        fill="#A8443C" 
        opacity="0.45"/>
  
  <!-- 前山（实） - 近景主峰 -->
  <path d="M14 76 L24 60 L34 70 L44 56 L52 66 L62 54 L72 64 L80 58 L86 76 Z" 
        fill="#A8443C"/>
  
  <!-- 山顶明珠/日 -->
  <circle cx="50" cy="40" r="3.5" fill="#A8443C"/>
  
</svg>
