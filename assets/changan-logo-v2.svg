<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 
    长安 Logo - 开口佛珠 · 山行 v2
    设计理念：开口佛珠手串 + 层叠山峦 + 山顶明珠
    底部圆环已移除，仅保留山形与佛珠开口
  -->
  
  <!-- 开口圆环（佛珠手串） - 顶部开口，两侧弧线向下延伸 -->
  <path d="M 20 18 
           C 10 28, 8 40, 8 50 
           C 8 62, 10 72, 14 80" 
        stroke="#A8443C" 
        stroke-width="3" 
        stroke-linecap="round" 
        fill="none"/>
  
  <path d="M 80 18 
           C 90 28, 92 40, 92 50 
           C 92 62, 90 72, 86 80" 
        stroke="#A8443C" 
        stroke-width="3" 
        stroke-linecap="round" 
        fill="none"/>
  
  <!-- 左侧开口端珠子 -->
  <circle cx="18" cy="16" r="4" fill="#A8443C"/>
  
  <!-- 右侧开口端珠子 -->
  <circle cx="82" cy="16" r="4" fill="#A8443C"/>
  
  <!-- 左上方珠子组 -->
  <circle cx="28" cy="10" r="3" fill="#A8443C"/>
  <circle cx="35" cy="8" r="2.5" fill="#A8443C"/>
  
  <!-- 右上方珠子组 -->
  <circle cx="72" cy="10" r="3" fill="#A8443C"/>
  <circle cx="65" cy="8" r="2.5" fill="#A8443C"/>
  
  <!-- 后山（最虚） - 远景山脉，最靠上 -->
  <path d="M 40 42 L 44 36 L 48 40 L 52 34 L 56 40 L 60 36 L 64 42 Z" 
        fill="#A8443C" 
        opacity="0.25"/>
  
  <!-- 中山（半虚） - 中景山脉 -->
  <path d="M 32 52 L 38 42 L 44 50 L 50 40 L 56 50 L 62 42 L 68 52 Z" 
        fill="#A8443C" 
        opacity="0.5"/>
  
  <!-- 前山（实） - 近景主峰，最宽 -->
  <path d="M 22 66 L 30 50 L 38 62 L 46 48 L 54 60 L 62 48 L 70 62 L 78 52 L 82 66 Z" 
        fill="#A8443C"/>
  
  <!-- 山顶明珠 -->
  <circle cx="50" cy="28" r="3.5" fill="#A8443C"/>
  
</svg>
